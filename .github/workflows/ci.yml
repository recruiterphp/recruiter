name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      run_long_tests:
        description: 'Run long tests'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate-composer:
    name: 'Composer Validate'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

  build-image:
    name: 'Build Docker Image (PHP ${{ matrix.php_version }})'
    needs: validate-composer
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ['8.4', '8.5']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        target: ci
        push: false
        load: true
        tags: recruiterphp/recruiter-php:latest
        build-args: |
          PHP_VERSION=${{ matrix.php_version }}
        cache-from: type=gha,scope=php-${{ matrix.php_version }}
        cache-to: type=gha,scope=php-${{ matrix.php_version }},mode=max

    - name: Save Docker image to tar
      run: docker save recruiterphp/recruiter-php:latest -o recruiter-php.tar

    - name: Upload image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image-${{ matrix.php_version }}
        path: recruiter-php.tar

  test-fast:
    name: 'Run fast tests (PHP ${{ matrix.php_version }})'
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php_version: ['8.4', '8.5']
    env:
      COMPOSE_FILE: compose.yaml
    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: docker-image-${{ matrix.php_version }}
        path: .

    - name: Load Docker image
      run: docker load -i recruiter-php.tar

    - name: Run fast tests
      run: make test

  test-long:
    name: 'Run long tests (PHP ${{ matrix.php_version }})'
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event.inputs.run_long_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        php_version: ['8.4', '8.5']
    env:
      COMPOSE_FILE: compose.yaml
    steps:
    - uses: actions/checkout@v4

    - uses: actions/download-artifact@v4
      with:
        name: docker-image-${{ matrix.php_version }}
        path: .

    - name: Load Docker image
      run: docker load -i recruiter-php.tar

    - name: Run long tests
      run: make test-acceptance-long
